      por 40+min nesta sessão (3 tentativas) — não resolvido, ver handoff
      memory/handoffs/2026-07-23-pulse-eco-onboarding.md. Próximo: resolver
      o deploy travado, terminar Fase 4 (corte de produção).

  - id: raiox-mvp-html
    display_name: Pulse Lume + Pulse Eco (landing/checkout)
    path: ~/dev/raiox-mvp-html  # movido de ~/Documents/raiox-mvp-html em 2026-07-24 (ver handoff)
    repo: https://github.com/Grupo-Velas/raiox-mvp-html
    status: active
    context: work
    agents:
      - claude-code
    notes: >
      Landing estática (Vercel, sem framework) que vende dois produtos:
      "Pulse Lume" (diagnóstico financeiro, ex-"Raio-X", checkout simulado
      via api/create-stripe-checkout.js/comprar.html) e "Pulse Eco" (análise
      de atendimento WhatsApp — comprar-eco.html + api/pulse-eco-checkout.js,
      que chama /api/onboarding/provision no repo pulse pra criar a conta e
      manda o email de acesso pelo webhook interno "Connect", mesmo canal
      que já envia o resultado do Lume). Sem conta Stripe real ainda — o
      "pagamento" do Eco é simulado de propósito. Primeiro commit git em
      2026-07-23 (nunca tinha sido versionado antes, vivia só no iCloud);
      movido de ~/Documents pra ~/dev em 2026-07-24 depois que
      ~/Documents ficou inacessível (EPERM) no mac-grupovelas — ver handoff
