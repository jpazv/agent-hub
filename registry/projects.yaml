      https://pulse-raiox.vercel.app, https://checkpulse.com.br — DNS do
      checkpulse não configurado, sem acesso). ⚠️ Alias curto não está
      promovendo pro deploy mais recente (mesmo sintoma "not ready"/
      autorização visto no pulse-app) — ver handoff 2026-07-24.
      Handoffs: memory/handoffs/2026-07-23-pulse-eco-onboarding.md,
      memory/handoffs/2026-07-24-css-fixes-e-icloud-lockout.md.

